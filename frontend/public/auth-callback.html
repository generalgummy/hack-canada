<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Callback</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f5f9f5;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        h1 { color: #1b5e20; margin: 0 0 10px 0; }
        p { color: #666; margin: 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌾 Northern Harvest</h1>
        <p>Completing authentication...</p>
    </div>

    <script>
        // Extract authorization code from URL
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const error = urlParams.get('error');
        const errorDescription = urlParams.get('error_description');

        if (code) {
            console.log('✅ Auth callback received code:', code);
            // Send code to parent window (the popup opener)
            if (window.opener) {
                window.opener.postMessage({
                    type: 'AUTH0_CODE',
                    code: code
                }, window.location.origin);
                console.log('✅ Sent code to parent window');
            }
            // Also close the popup
            setTimeout(() => window.close(), 500);
        } else if (error) {
            console.error('❌ Auth error:', error, errorDescription);
            if (window.opener) {
                window.opener.postMessage({
                    type: 'AUTH0_ERROR',
                    error: error,
                    errorDescription: errorDescription
                }, window.location.origin);
            }
            setTimeout(() => window.close(), 500);
        } else {
            console.log('❓ Auth callback page loaded but no code or error found');
            // Fallback: try to send current URL to parent
            if (window.opener) {
                window.opener.postMessage({
                    type: 'AUTH0_URL',
                    url: window.location.href
                }, window.location.origin);
            }
        }
    </script>
</body>
</html>
