version: "3.8"

services:
  # ================================
  # Backend API Server
  # ================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: northern-harvest-backend
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/api/auth/me"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ================================
  # ngrok Tunnel (exposes backend to the internet)
  # ================================
  ngrok:
    image: ngrok/ngrok:latest
    container_name: northern-harvest-ngrok
    command: ["http", "backend:5001", "--log=stdout"]
    ports:
      - "4040:4040" # ngrok web UI — visit http://localhost:4040 to see the public URL
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN:-}
    restart: unless-stopped

  # ================================
  # Frontend Expo Dev Server (optional — can also run locally)
  # ================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: northern-harvest-frontend
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    depends_on:
      - backend
    stdin_open: true
    tty: true
    restart: unless-stopped
    profiles:
      - with-frontend
