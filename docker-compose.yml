services:
  # ================================
  # Backend API Server
  # ================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: northern-harvest-backend
    ports:
      - "${BACKEND_PORT:-5001}:5001"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ================================
  # Frontend Web App (production nginx)
  # ================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # The URL where the backend will be reachable from the browser.
        # For local Docker: http://localhost:5001
        # For production: https://api.yourdomain.com
        EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL:-http://localhost:5001}
    container_name: northern-harvest-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ================================
  # ngrok Tunnel (optional — exposes backend to the internet)
  # ================================
  ngrok:
    image: ngrok/ngrok:latest
    container_name: northern-harvest-ngrok
    command: ["http", "backend:5001", "--log=stdout"]
    ports:
      - "4040:4040"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN:-}
    restart: unless-stopped
    profiles:
      - tunnel
